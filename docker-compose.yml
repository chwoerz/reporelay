# ── Shared environment variables (used by worker, web, and mcp) ──
x-shared-env: &shared-env
  DATABASE_URL: postgresql://reporelay:reporelay@postgres:5432/reporelay
  EMBEDDING_URL: http://host.docker.internal:11434
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
  GIT_MIRRORS_DIR: /data/mirrors
  GIT_TOKEN_GITHUB_COM: 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
  LOG_LEVEL: ${LOG_LEVEL:-info}

services:
  # ── ParadeDB (Postgres + pgvector + pg_trgm + pg_search) ──
  postgres:
    image: paradedb/paradedb:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: reporelay
      POSTGRES_USER: reporelay
      POSTGRES_PASSWORD: reporelay
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reporelay -d reporelay"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Worker (pg-boss index job handler — sole migration owner) ──
  worker:
    build: .
    command: ["node", "dist/src/worker/index.js"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *shared-env
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-64}
      GIT_WORKTREES_DIR: /data/worktrees
    volumes:
      - gitdata:/data

  # ── Web API (Fastify REST API + Swagger UI) ──
  web:
    build: .
    command: ["node", "dist/src/web/main.js"]
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      worker:
        condition: service_started
    environment:
      <<: *shared-env
      WEB_PORT: 3001
    volumes:
      - gitdata:/data

  # ── MCP Server (Model Context Protocol over HTTP) ──
  mcp:
    build: .
    command: ["node", "dist/src/mcp/main.js"]
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      worker:
        condition: service_started
    environment:
      <<: *shared-env
      MCP_SERVER_PORT: 3000
    volumes:
      - gitdata:/data:ro

  # ── UI (Angular admin dashboard served by nginx) ──
  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    ports:
      - "80:80"
    depends_on:
      web:
        condition: service_started

volumes:
  pgdata:
  gitdata:
