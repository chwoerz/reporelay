# ── Shared environment OVERRIDES for Docker (take precedence over env_file) ──
# NOTE: DATABASE_URL is hardcoded here because Docker containers must reach
# Postgres via the compose service name ("postgres"), not "localhost" which
# the .env file uses for local `pnpm dev`.
# GIT_MIRRORS_DIR and GIT_WORKTREES_DIR use container-internal paths backed
# by the shared `gitdata` Docker volume.
x-shared-env: &shared-env
  DATABASE_URL: postgresql://reporelay:reporelay@postgres:5432/reporelay
  EMBEDDING_URL: http://host.docker.internal:11434
  GIT_MIRRORS_DIR: /data/mirrors

services:
  # ── ParadeDB (Postgres + pgvector + pg_trgm + pg_search) ──
  postgres:
    image: paradedb/paradedb:18-v0.22.5
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: reporelay
      POSTGRES_USER: reporelay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reporelay}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reporelay -d reporelay"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Worker (pg-boss index job handler — sole migration owner) ──
  worker:
    build: .
    command: ["node", "dist/src/worker/index.js"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      <<: *shared-env
      GIT_WORKTREES_DIR: /data/worktrees
    volumes:
      - gitdata:/data

  # ── Web API (Fastify REST API + Swagger UI) ──
  web:
    build: .
    command: ["node", "dist/src/web/main.js"]
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      worker:
        condition: service_started
    env_file: .env
    environment:
      <<: *shared-env
    volumes:
      - gitdata:/data

  # ── MCP Server (Model Context Protocol over HTTP) ──
  mcp:
    build: .
    command: ["node", "dist/src/mcp/main.js"]
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      worker:
        condition: service_started
    env_file: .env
    environment:
      <<: *shared-env
    volumes:
      - gitdata:/data:ro

  # ── UI (Angular admin dashboard served by nginx) ──
  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    ports:
      - "80:80"
    depends_on:
      web:
        condition: service_started

volumes:
  pgdata:
  gitdata:
